<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web Component Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            background: #f5f5f5;
        }
        #output {
            border: 1px solid #ccc;
            padding: 8px;
            margin-top: 10px;
            background: #ffffff;
            min-height: 30px;
        }
    </style>
</head>
<body>
    <strong>Web Component Demo</strong>
    <p>Functions: echo(msg), getTimestamp(), add(a,b), greet(name)</p>
    <div id="output">Loading...</div>

    <script>
        // ---------------------------------------------------------------
        // Genero 6.x Web Component API
        // GDC/GBC calls the GLOBAL function onICHostReady(version) once
        // the host channel is established. All gICAPI callbacks must be
        // assigned inside that function.
        // ---------------------------------------------------------------

        var onICHostReady = function(version) {

            document.getElementById("output").innerText =
                "Ready (API v" + version + ")";

            // Called when the widget gains or loses focus
            gICAPI.onFocus = function(polarity) {};

            // Called when BDL assigns data to the WEBCOMPONENT field
            gICAPI.onData = function(content) {
                document.getElementById("output").innerText =
                    "Data: " + content;
            };

            // Called to request the current field value back to BDL
            gICAPI.onFlushData = function() {
                gICAPI.SetData("");
            };
        };

        // ---------------------------------------------------------------
        // Functions callable via the  webcomponent.call  frontcall
        // ---------------------------------------------------------------

        function echo(message) {
            document.getElementById("output").innerText = message;
            return message;
        }

        function getTimestamp() {
            var ts = new Date().toISOString();
            document.getElementById("output").innerText = ts;
            return ts;
        }

        function add(a, b) {
            var result = Number(a) + Number(b);
            document.getElementById("output").innerText = "Result: " + result;
            return String(result);
        }

        function greet(name) {
            var msg = "Hello, " + (name || "World") + "!";
            document.getElementById("output").innerText = msg;
            return msg;
        }
    </script>
</body>
</html>
